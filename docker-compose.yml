version: "3.9"

services:
  backend:
    build: ./backend
    container_name: onboarding-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: onboarding-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
