<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workflow2 Negotiation Test</title>
    <style>
      :root {
        --bg: #0b0c12;
        --panel: #15182a;
        --panel-2: #1b2036;
        --accent: #7c5cff;
        --accent-2: #48e0a4;
        --text: #f4f5fb;
        --muted: #a7b0c2;
        --mono: "SFMono-Regular", ui-monospace, "Menlo", "Monaco", "Courier New", monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #20253b, var(--bg));
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
      }
      h1 { margin-top: 0; }
      .section {
        background: var(--panel);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }
      textarea {
        width: 100%;
        min-height: 120px;
        background: var(--panel-2);
        color: var(--text);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 12px;
        font-family: var(--mono);
      }
      button {
        background: var(--accent);
        border: none;
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      .mic {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--accent-2);
        margin-top: 12px;
        position: relative;
      }
      .mic.recording::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 2px solid rgba(72, 224, 164, 0.4);
        animation: pulse 1.4s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.7; }
        70% { transform: scale(1.2); opacity: 0; }
        100% { opacity: 0; }
      }
      .loan-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
        border-radius: 12px;
      }
      .chat {
        background: var(--panel-2);
        border-radius: 14px;
        padding: 12px;
        height: 260px;
        overflow-y: auto;
        display: grid;
        gap: 10px;
      }
      .bubble {
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 75%;
        font-size: 13px;
      }
      .bubble.agent { background: rgba(255, 255, 255, 0.08); }
      .bubble.user { background: rgba(124, 92, 255, 0.25); justify-self: end; }
      .offer-card {
        background: rgba(72, 224, 164, 0.08);
        padding: 12px;
        border-radius: 12px;
      }
      .bar {
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > div {
        height: 100%;
        background: linear-gradient(90deg, #48e0a4, #7c5cff);
        width: 50%;
      }
      pre {
        background: rgba(255, 255, 255, 0.06);
        padding: 10px;
        border-radius: 10px;
        font-size: 12px;
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <h1>Loan Selection + Negotiation</h1>

    <div class="section">
      <h2>1. Loan Query (audio)</h2>
      <textarea id="policy_inputs">
{
  "age": 34,
  "employment_type": "salaried",
  "gross_monthly_income": 95000,
  "net_monthly_income": 78000,
  "existing_emi_monthly": 8000,
  "credit_score": 720,
  "fraud_score": 15,
  "risk_persona": "standard",
  "intent_category": null,
  "requested_amount": 500000,
  "preferred_tenure_months": 120,
  "collateral_offered": false,
  "collateral_value": null,
  "missed_payments_last_12m": 0
}
      </textarea>
      <div>
        <button class="mic" id="mic_query">Mic</button>
        <span id="query_transcript" style="margin-left: 12px;"></span>
      </div>
      <button id="search_loans" style="margin-top: 12px;">Search Loans</button>
      <pre id="pre_eligibility"></pre>
      <div class="loan-cards" id="loan_cards"></div>
    </div>

    <div class="section" id="offer_section" style="display:none;">
      <h2>2. Offer Display</h2>
      <div class="offer-card" id="offer_card"></div>
      <div style="margin-top: 12px; display:flex; gap: 12px;">
        <button id="accept_offer">Accept Offer</button>
        <button id="negotiate_offer">Negotiate</button>
      </div>
    </div>

    <div class="section" id="negotiation_section" style="display:none;">
      <h2>3. Negotiation</h2>
      <div class="chat" id="negotiation_chat"></div>
      <button class="mic" id="mic_negotiation">Mic</button>
      <div style="margin-top: 12px;">
        <div>Conversion probability</div>
        <div class="bar"><div id="conversion_bar"></div></div>
      </div>
      <div id="concession_tag" style="margin-top: 10px;"></div>
      <div id="round_counter" style="margin-top: 6px;"></div>
      <pre id="consent_record"></pre>
    </div>

    <script>
      const API_BASE = "http://localhost:8001";
      let sessionId = `test-${Date.now()}`;
      let loanResults = [];
      let selectedLoan = null;
      let offer = null;
      let negotiationId = null;
      let queryTranscript = "";

      let mediaRecorder;
      let chunks = [];
      let recording = false;

      function getSupportedMimeType() {
        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/mp4",
        ];
        return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
      }

      function extensionFromMime(mimeType) {
        if (mimeType.includes("mp4")) return "mp4";
        if (mimeType.includes("ogg")) return "ogg";
        return "webm";
      }

      async function recordAudio(target) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = getSupportedMimeType();
        mediaRecorder = mimeType
          ? new MediaRecorder(stream, { mimeType })
          : new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) chunks.push(event.data);
        };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach((track) => track.stop());
          sendAudio(target);
        };
        mediaRecorder.start();
        recording = true;
        target.classList.add("recording");
      }

      function stopRecording(target) {
        if (mediaRecorder && recording) {
          mediaRecorder.stop();
          recording = false;
          target.classList.remove("recording");
        }
      }

      async function sendAudio(target) {
        const mimeType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : "audio/webm";
        const blob = new Blob(chunks, { type: mimeType });
        const ext = extensionFromMime(mimeType);
        const form = new FormData();
        form.append("audio", blob, `turn_${Date.now()}.${ext}`);
        form.append("session_id", sessionId);
        form.append("turn_number", 1);
        form.append("stage", "negotiation");

        const sttRes = await fetch(`${API_BASE}/stt`, { method: "POST", body: form });
        const stt = await sttRes.json();

        if (target.id === "mic_query") {
          queryTranscript = stt.transcript || "";
          document.getElementById("query_transcript").textContent = queryTranscript;
        } else {
          await runNegotiationTurn(stt.transcript || "");
        }
      }

      function getPolicyInputs() {
        return JSON.parse(document.getElementById("policy_inputs").value);
      }

      async function searchLoans() {
        const payload = { ...getPolicyInputs(), session_id: sessionId, query: queryTranscript };
        const res = await fetch(`${API_BASE}/loans/search`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        loanResults = data.top_3_loans || [];
        document.getElementById("pre_eligibility").textContent = JSON.stringify(data.pre_eligibility, null, 2);

        const cards = document.getElementById("loan_cards");
        cards.innerHTML = "";
        loanResults.forEach((loan, idx) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <strong>${loan.loan_name}</strong><br/>
            ${loan.loan_type}<br/>
            Base rate: ${loan.product_terms.base_interest_rate_annual}%<br/>
            Max amount: ${loan.product_terms.max_amount}
            <button style='margin-top:8px;' data-idx='${idx}'>Select This Loan</button>
          `;
          card.querySelector("button").addEventListener("click", () => selectLoan(idx));
          cards.appendChild(card);
        });
      }

      async function selectLoan(idx) {
        selectedLoan = loanResults[idx];
        const payload = {
          session_id: sessionId,
          loan_choice_index: idx + 1,
          policy_inputs: getPolicyInputs(),
        };
        const res = await fetch(`${API_BASE}/loans/offer`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        offer = await res.json();
        document.getElementById("offer_section").style.display = "block";
        document.getElementById("offer_card").textContent = JSON.stringify(offer, null, 2);
      }

      async function startNegotiation() {
        const payload = {
          session_id: sessionId,
          loan_id: selectedLoan.loan_id,
          offer: offer.offer,
        };
        const res = await fetch(`${API_BASE}/negotiate/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        negotiationId = data.negotiation_id;
        document.getElementById("negotiation_section").style.display = "block";
        addChatBubble(data.agent_message, "agent");
      }

      async function runNegotiationTurn(text) {
        addChatBubble(text, "user");
        const payload = { user_message: text };
        const res = await fetch(`${API_BASE}/negotiate/${negotiationId}/turn`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        addChatBubble(data.agent_message, "agent");
        document.getElementById("conversion_bar").style.width = `${Math.round(data.conversion_probability * 100)}%`;
        document.getElementById("concession_tag").textContent = data.concession_offered || "";
        document.getElementById("round_counter").textContent = `Round ${data.rounds_elapsed} of 8`;
        if (data.status === "accepted") {
          document.getElementById("consent_record").textContent = "Accepted. Use Accept Offer to fetch consent record.";
        }
      }

      function addChatBubble(text, role) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        const chat = document.getElementById("negotiation_chat");
        chat.appendChild(bubble);
        chat.scrollTop = chat.scrollHeight;
      }

      document.getElementById("mic_query").addEventListener("click", (e) => {
        if (recording) stopRecording(e.target);
        else recordAudio(e.target);
      });
      document.getElementById("mic_negotiation").addEventListener("click", (e) => {
        if (recording) stopRecording(e.target);
        else recordAudio(e.target);
      });
      document.getElementById("search_loans").addEventListener("click", searchLoans);
      document.getElementById("negotiate_offer").addEventListener("click", startNegotiation);
      document.getElementById("accept_offer").addEventListener("click", async () => {
        const payload = { user_utterance: "I accept" };
        const res = await fetch(`${API_BASE}/negotiate/${negotiationId}/accept`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        document.getElementById("consent_record").textContent = JSON.stringify(data.consent_record, null, 2);
      });
    </script>
  </body>
</html>
